services:
  - type: web
    name: youtubesummarizer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: RENDER
        value: "true"
